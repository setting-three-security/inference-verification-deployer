shim-version: v0.4.2@sha256:d65f769e37bbe86ffaeef42120c29c4b9de33415fcd7588a9ef7a64f609aa2a3
cvm-version: 0.6.9
cpus: 8
memory: 65536

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.7@sha256:0ceab4baa4723c774d26cf57d9f7c945cfa5da2baa214d73f04063d658e18b14"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  listen-port: 443
  upstream-port: 8080
  paths:
