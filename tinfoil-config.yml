cvm-version: 0.7.3
memory: 65536
cpus: 8
gpus: 1

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.13@sha256:8d8bc54b9aa91b376c292a0179b6b448d0a70bad401bc70d9394606e7d73d2bf"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  upstream-port: 8080
  paths:
    - /verify
    - /verify-stream
    - /query
    - /verify-text
    - /verify-text-stream
    - /health
    - /config
    - /ui
