cvm-version: 0.7.3
memory: 65536
cpus: 8
gpus: 1

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.16@sha256:1b19d4973004ba16c4422f350587e6ec891a4f8f0781b1b5566a372f53602c3f"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  upstream-port: 8080
  paths:
    - /verify
    - /verify-stream
    - /query
    - /verify-text
    - /verify-text-stream
    - /health
    - /config
    - /ui
