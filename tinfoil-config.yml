cvm-version: 0.7.3
memory: 65536
cpus: 8
gpus: 1

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.19@sha256:084a203c23b6448e1ccf7bdba7866f8ca281b0b4b627041a89a6939fb202e5ed"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  upstream-port: 8080
  paths:
    - /verify
    - /verify-stream
    - /query
    - /verify-text
    - /verify-text-stream
    - /health
    - /config
    - /ui
