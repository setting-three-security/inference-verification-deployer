cpus: 8
memory: 65536

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.4@sha256:sha256:968d06a41da27a4d85c1866b4d390e3b5925fe754964d742e7315081ced08420"
