cvm-version: 0.7.3
memory: 65536
cpus: 8
gpus: 1

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.15@sha256:d45b41cc026778b9df4bc229c4d934a3fe85a90992222ced43ffe1b5b0e28b34"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  upstream-port: 8080
  paths:
    - /verify
    - /verify-stream
    - /query
    - /verify-text
    - /verify-text-stream
    - /health
    - /config
    - /ui
