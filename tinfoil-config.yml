cvm-version: 0.6.9
cpus: 8
memory: 65536

containers:
  - name: "inference-verifier"
    image: "ghcr.io/setting-three-security/inference-verification-tee:v0.9.8@sha256:d3423aee5d03890c6acca4c0c5148f102717794ca4168dfe80881b0dc74632cb"
    runtime: nvidia
    gpus: all
    secrets:
      - HF_TOKEN
      - OPENROUTER_DEMO

shim:
  listen-port: 443
  upstream-port: 8080
  paths:
